  # generate required test data from profile "<url>" as "<var>"
  - match: '^generate required test data from profile "([^"]+)" as "([A-Za-z_][A-Za-z0-9_]*)"$'
    actions:
      - assign:
          to: 'fhirValidatorHeaders{Content-Type}'
          value: '"application/json"'
      - assign:
          to: 'fhirValidatorHeaders{Accept}'
          value: '"application/json"'
      - send:
          id: 'lastRequest'
          desc: 'Generate required-only test data from profile'
          handler: 'HttpMessagingV2'
          inputs:
            uri: 'concat($FHIRValidatorBase, "/itb/testdata/process")'
            method: '"POST"'
            headers: '$fhirValidatorHeaders'
            body: "concat('{\"operation\":\"generate\",\"input\":[{\"name\":\"profile\",\"value\":\"', \"$1\", '\",\"embeddingMethod\":\"STRING\"},{\"name\":\"requiredOnly\",\"value\":\"true\",\"embeddingMethod\":\"STRING\"}]}')"
