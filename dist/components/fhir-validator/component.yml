# Test Image Component: FHIR Validator
# Provides FHIR resource validation against profiles and IGs
id: fhir-validator
name: FHIR Validator
version: "1.0"
description: >
  FHIR server with $validate support. Validates resources against
  StructureDefinitions and Implementation Guides.

docker:
  image: hapiproject/hapi:latest
  ports:
    - "8080:8080"
  environment:
    - hapi.fhir.validation.enabled=true

healthCheck:
  method: GET
  path: /fhir/metadata
  expect:
    status: 200

actors:
  - id: FHIRValidator
    description: FHIR validation server

language: steps.yml
