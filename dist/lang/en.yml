version: 1
locale: en

# ====================================================================
# FHIR Gherkin Dialect — Core Language Specification
# ====================================================================
# Generic ITB test step patterns. Domain-specific steps (validation,
# FHIRPath, matchetype, test data) are provided by component extensions
# in public/components/*/steps.yml.
#
# Syntax conventions:
#   <required>     — a required parameter
#   [optional]     — an optional clause
#   <Actor>        — an actor identifier (e.g. User, FHIRValidator)
#   <variable>     — a variable name
#   <value>        — a quoted string value
# ====================================================================

steps:

  # ==================================================================
  # 1. ACTORS
  # ==================================================================
  # Doc: <Actor> is the system under test [at <endpoint>] [as defined by <canonical>]
  # Doc: <Actor> is available [as "<name>"] [at <endpoint>] [as defined by <canonical>]

  # -- System Under Test (most specific first) --

  - match: '^([A-Za-z][A-Za-z0-9_]*) is the system under test (?:on|at) "?(https?://[^"\s]+)"? as defined by "?(https?://[^"\s]+)"?$'
    actions:
      - declareActor: { id: '$1', role: 'SUT', endpoint: '$2', canonical: '$3' }
      - assign: { to: '$1Base', value: '"$2"' }

  - match: '^([A-Za-z][A-Za-z0-9_]*) is the system under test (?:on|at) "?(https?://[^"\s]+)"?$'
    actions:
      - declareActor: { id: '$1', role: 'SUT', endpoint: '$2' }
      - assign: { to: '$1Base', value: '"$2"' }

  - match: '^([A-Za-z][A-Za-z0-9_]*) is the system under test as defined by "?(https?://[^"\s]+)"?$'
    actions:
      - declareActor: { id: '$1', role: 'SUT', canonical: '$2' }

  - match: '^([A-Za-z][A-Za-z0-9_]*) is the system under test$'
    actions:
      - declareActor: { id: '$1', role: 'SUT' }

  # -- Available actors (most specific first) --

  - match: '^([A-Za-z][A-Za-z0-9_]*) is available (?:on|at) "?(https?://[^"\s]+)"? as defined by "?(https?://[^"\s]+)"?$'
    actions:
      - declareActor: { id: '$1', endpoint: '$2', canonical: '$3' }
      - assign: { to: '$1Base', value: '"$2"' }

  - match: '^([A-Za-z][A-Za-z0-9_]*) is available (?:on|at) "?(https?://[^"\s]+)"?$'
    actions:
      - declareActor: { id: '$1', endpoint: '$2' }
      - assign: { to: '$1Base', value: '"$2"' }

  - match: '^([A-Za-z][A-Za-z0-9_]*) is available as defined by "?(https?://[^"\s]+)"?$'
    actions:
      - declareActor: { id: '$1', canonical: '$2' }

  - match: '^([A-Za-z][A-Za-z0-9_]*) is available as "([^"]+)"$'
    actions:
      - declareActor: { id: '$1', name: '$2' }

  - match: '^([A-Za-z][A-Za-z0-9_]*) is available$'
    actions:
      - declareActor: { id: '$1' }

  # ==================================================================
  # 2. HTTP
  # ==================================================================
  # Doc: <Actor> calls <Actor> at "<path>" [with: (docstring)]
  # Doc: fetch "<url>" as "<variable>"

  # Actor-to-actor request with relative path and JSON body
  - match: '^([A-Za-z][A-Za-z0-9_]*) calls ([A-Za-z][A-Za-z0-9_]*) at "([^"]+)" with:$'
    actions:
      - assign: { to: 'jsonHeaders{Content-Type}', value: '"application/json"' }
      - assign: { to: 'jsonHeaders{Accept}', value: '"application/json"' }
      - send:
          id: 'lastRequest'
          desc: 'POST JSON'
          handler: 'HttpMessagingV2'
          from: '$1'
          to: '$2'
          inputs:
            uri: 'concat($$2Base, "$3")'
            method: '"POST"'
            headers: '$jsonHeaders'
            body: '$docString'

  # Fetch a URL (GET) and store the response body
  - match: '^fetch "([^"]+)" as "([A-Za-z_][A-Za-z0-9_]*)"$'
    actions:
      - assign: { to: 'jsonHeaders{Accept}', value: '"application/json"' }
      - send:
          id: 'lastRequest'
          desc: 'GET'
          handler: 'HttpMessagingV2'
          inputs:
            uri: '"$1"'
            method: '"GET"'
            headers: '$jsonHeaders'
      - verify:
          handler: 'NumberValidator'
          desc: 'HTTP 200'
          inputs: { actualnumber: '$lastRequest{response}{status}', expectednumber: '"200"' }
      - assign: { to: '$2', value: '$lastRequest{response}{body}' }

  # ==================================================================
  # 3. VARIABLES & DATA
  # ==================================================================
  # Doc: set "<variable>" to "<value>"
  # Doc: set "<variable>" to: (docstring)
  # Doc: extract "<jsonPointer>" [from "<variable>"] as "<variable>"

  # Set variable to string
  - match: '^set "([A-Za-z_][A-Za-z0-9_]*)" to "([^"]+)"$'
    actions:
      - assign: { to: '$1', value: '"$2"' }

  # Set variable to docstring (inline JSON etc.)
  - match: '^set "([A-Za-z_][A-Za-z0-9_]*)" to:$'
    actions:
      - assign: { to: '$1', value: '$docString' }

  # Legacy alias
  - match: '^define resource "([A-Za-z_][A-Za-z0-9_]*)" as:$'
    actions:
      - assign: { to: '$1', value: '$docString' }

  # Extract from a named variable (must be before the shorter pattern)
  - match: '^extract "([^"]+)" from "([A-Za-z_][A-Za-z0-9_]*)" as "([A-Za-z_][A-Za-z0-9_]*)"$'
    actions:
      - process:
          handler: 'JsonPointerProcessor'
          operation: 'process'
          output: '$3'
          inputs: { content: '$$2', pointer: '"$1"' }

  # Extract from the last response
  - match: '^extract "([^"]+)" as "([A-Za-z_][A-Za-z0-9_]*)"$'
    actions:
      - process:
          handler: 'JsonPointerProcessor'
          operation: 'process'
          output: '$2'
          inputs: { content: '$lastRequest{response}{body}', pointer: '"$1"' }

  # ==================================================================
  # 4. ASSERTIONS
  # ==================================================================
  # Doc: "<variable>" should be "<value>"
  # Doc: "<variable>" should contain "<substring>"
  # Doc: "<variable>" should not be empty
  # Doc: the response status should be "<code>" [or "<code>"...]
  # Doc: the validation has <n> errors and <n> warnings

  - match: '^(?:the value of )?"([A-Za-z_][A-Za-z0-9_]*)" should be "([^"]+)"$'
    actions:
      - verify:
          handler: 'StringValidator'
          desc: 'Equals'
          inputs: { actualstring: '$$1', expectedstring: '"$2"' }

  - match: '^(?:the value of )?"([A-Za-z_][A-Za-z0-9_]*)" should contain "([^"]+)"$'
    actions:
      - verify:
          handler: 'StringValidator'
          desc: 'Contains'
          inputs: { actualstring: '$$1', expectedstring: '"$2"', matchType: '"contains"' }

  - match: '^(?:the value of )?"([A-Za-z_][A-Za-z0-9_]*)" should not be empty$'
    actions:
      - verify:
          handler: 'StringValidator'
          desc: 'Not empty'
          inputs: { actualstring: '$$1', expectedstring: '"not-null"' }

  - match: '^the response status should be "([0-9]{3})"$'
    actions:
      - verify:
          handler: 'NumberValidator'
          desc: 'HTTP status'
          inputs: { actualnumber: '$lastRequest{response}{status}', expectednumber: '"$1"' }

  - match: '^the response status should be ("[0-9]{3}"(?:\s+or\s+"[0-9]{3}")*)$'
    actions:
      - verify:
          handler: 'ExpressionValidator'
          desc: 'HTTP status one of'
          inputs: { expression: '$statusOrExpr' }

  - match: '^the response status should be in \[("[0-9]{3}"(?:\s*,\s*"[0-9]{3}")*)\]$'
    actions:
      - verify:
          handler: 'ExpressionValidator'
          desc: 'HTTP status one of'
          inputs: { expression: '$statusOrExpr' }

  - match: '^the validation has ([0-9]+) errors? and ([0-9]+) warnings?$'
    actions:
      - verify:
          handler: 'StringValidator'
          desc: 'Error count'
          inputs: { actualstring: '$validationErrors', expectedstring: '"$1"' }
      - verify:
          handler: 'StringValidator'
          desc: 'Warning count'
          inputs: { actualstring: '$validationWarnings', expectedstring: '"$2"' }

  # ==================================================================
  # 5. USER & MONITOR INTERACTION
  # ==================================================================
  # Doc: inform <user|monitor> "<message>"
  # Doc: ask <user|monitor> for "<variable>" [with prompt "<description>"]
  # Doc: monitor is asked to review ["<content>"] with "<message>"

  - match: '^inform (?:the )?user "(.+)"$'
    actions:
      - call:
          path: scriptlets/instructUser.xml
          inputs: { step: '"informUser"', message: '"$1"' }

  - match: '^inform (?:the )?monitor "(.+)"$'
    actions:
      - call:
          path: scriptlets/instructUser.xml
          inputs: { step: '"informMonitor"', message: '"$1"' }

  - match: '^ask user for "([A-Za-z_][A-Za-z0-9_]*)" with prompt "([^"]+)"$'
    actions:
      - declareVariable: { name: '$1', varType: 'string' }
      - interact:
          id: 'askUser'
          desc: '$2'
          inputTitle: '$2'
          requests:
            - { desc: '$2', name: '$1', inputType: 'UPLOAD', required: true, variable: '$$1' }

  - match: '^ask user for "([A-Za-z_][A-Za-z0-9_]*)"$'
    actions:
      - declareVariable: { name: '$1', varType: 'string' }
      - interact:
          id: 'askUser'
          desc: 'Provide input'
          inputTitle: 'Provide input'
          requests:
            - { desc: 'Provide input:', name: '$1', inputType: 'UPLOAD', required: true, variable: '$$1' }

  - match: '^ask monitor for "([A-Za-z_][A-Za-z0-9_]*)" with prompt "([^"]+)"$'
    actions:
      - declareVariable: { name: '$1', varType: 'string' }
      - interact:
          id: 'askMonitor'
          desc: '$2'
          inputTitle: '$2'
          requests:
            - { desc: '$2', name: '$1', inputType: 'UPLOAD', required: true, variable: '$$1' }

  - match: '^ask monitor for "([A-Za-z_][A-Za-z0-9_]*)"$'
    actions:
      - declareVariable: { name: '$1', varType: 'string' }
      - interact:
          id: 'askMonitor'
          desc: 'Provide input'
          inputTitle: 'Provide input'
          requests:
            - { desc: 'Provide input:', name: '$1', inputType: 'UPLOAD', required: true, variable: '$$1' }

  - match: '^(?:the )?monitor is asked to review "([^"]+)" with "([^"]+)"$'
    actions:
      - call:
          path: scriptlets/instructUser.xml
          inputs: { step: '"monitorReview"', content: '"$1"', message: '"$2"' }

  - match: '^(?:the )?monitor is asked to review with "([^"]+)"$'
    actions:
      - call:
          path: scriptlets/instructUser.xml
          inputs: { step: '"monitorReview"', message: '"$1"' }

  # ==================================================================
  # 6. LOGGING
  # ==================================================================
  # Doc: log "<message>"
  # Doc: log "<variable>"

  - match: '^log "([^"]+)"$'
    actions:
      - log: '"$1"'

  - match: '^log variable "([A-Za-z_][A-Za-z0-9_]*)"$'
    actions:
      - log: 'concat("$1 = ", $$1)'
